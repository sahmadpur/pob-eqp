version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pob_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pob_eqp}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pob_user} -d ${POSTGRES_DB:-pob_eqp}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pob-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: pob-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-pob_user}:${POSTGRES_PASSWORD:-pob_secret}@postgres:5432/${POSTGRES_DB:-pob_eqp}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: sh -c "cd /app/apps/api && /app/node_modules/.bin/ts-node --transpile-only -r /app/node_modules/tsconfig-paths/register src/main.ts"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: pob-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/messages:/app/apps/web/messages

volumes:
  postgres_data:
  redis_data:
