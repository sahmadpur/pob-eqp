#version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pob_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pob_eqp}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pob_user} -d ${POSTGRES_DB:-pob_eqp}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pob-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pob-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI — open http://localhost:8025 to read emails

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: pob-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: development
      # CIBPAY (and other legacy bank) client certs use pbeWithSHA1And40BitRC2-CBC,
      # which OpenSSL 3 disables by default. Enable the legacy provider.
      NODE_OPTIONS: --openssl-legacy-provider
      DATABASE_URL: postgresql://${POSTGRES_USER:-pob_user}:${POSTGRES_PASSWORD:-pob_secret}@postgres:5432/${POSTGRES_DB:-pob_eqp}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
      UPLOADS_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${SMTP_FROM:-${MAIL_FROM:-noreply@portofbaku.az}}
      WEATHER_API_URL: ${WEATHER_API_URL:-https://api.openweathermap.org/data/2.5}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      CIBPAY_BASE_URL: ${CIBPAY_BASE_URL:-https://api-preprod.cibpay.co}
      CIBPAY_USERNAME: ${CIBPAY_USERNAME:-}
      CIBPAY_PASSWORD: ${CIBPAY_PASSWORD:-}
      CIBPAY_PFX_PATH: ${CIBPAY_PFX_PATH:-/app/secrets/cibpay.p12}
      CIBPAY_PFX_PASSWORD: ${CIBPAY_PFX_PASSWORD:-}
      CIBPAY_TERMINAL: ${CIBPAY_TERMINAL:-}
      CIBPAY_FORCE_3D: ${CIBPAY_FORCE_3D:-1}
      CIBPAY_DEFAULT_CURRENCY: ${CIBPAY_DEFAULT_CURRENCY:-AZN}
      CIBPAY_RETURN_BASE_URL: ${CIBPAY_RETURN_BASE_URL:-${FRONTEND_URL:-http://localhost:3000}}
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages:/app/packages
      - uploads_data:/app/uploads
      - ./secrets:/app/secrets:ro
    command: sh -c "cd /app/apps/api && npx prisma generate && /app/node_modules/.bin/ts-node --transpile-only -r /app/node_modules/tsconfig-paths/register src/main.ts"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: pob-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/messages:/app/apps/web/messages
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ./apps/web/postcss.config.js:/app/apps/web/postcss.config.js
      - ./apps/web/next.config.mjs:/app/apps/web/next.config.mjs
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
      - web_next_cache:/app/apps/web/.next

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  web_next_cache:
